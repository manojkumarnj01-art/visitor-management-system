# Spring Application Name
spring.application.name=visitor-management-backend
server.port=8080

# Microsoft SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=VisitorManagement;encrypt=true;trustServerCertificate=true;integratedSecurity=false;
spring.datasource.username=sa
spring.datasource.password=YourStrongPass123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# JWT Configuration
jwt.secret=9a2f8c4e6b1d7a3f8e5c2b0d4f6a8c1e3b5d7f9a2c4e6b8d0f2a4c6e8b1d3f5a
jwt.expiration-ms=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173

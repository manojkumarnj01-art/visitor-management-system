# Application Port Config (Cloud Run uses PORT environment variable)
server.port=${PORT:8080}

# Spring Data Source Settings (GCP Cloud SQL PostgreSQL Configs)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vms_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# GCP Storage Integrations
gcp.storage.bucket-name=${GCS_BUCKET:}
gcp.storage.project-id=${GCP_PROJECT:}

# Security Configs
jwt.secret=${JWT_SECRET:defaultSecretKeyForBharaniVmsMustBeLongEnoughToAvoidSignatureExceptions123456}

# VMS Public Base URL (configurable via env, defaults to localhost:8080)
vms.public-base-url=${VMS_PUBLIC_BASE_URL:http://localhost:8080}

# Multipart upload configs (up to 10MB per file)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
